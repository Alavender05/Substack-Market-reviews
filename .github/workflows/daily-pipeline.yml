name: Daily Substack Pipeline

on:
  schedule:
    # 06:00 AEST = 20:00 UTC on the previous day.
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-substack-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run daily pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python -m src.main

      - name: Upload generated outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-substack-output
          path: |
            data/processed/
            data/state/
            output/latest/
            logs/
          if-no-files-found: warn

      - name: Detect changed data files
        id: changes
        run: |
          if git diff --quiet -- data/ output/ logs/ README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated data files
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ output/ logs/ README.md
          git commit -m "chore: update daily pipeline outputs"
          git push
